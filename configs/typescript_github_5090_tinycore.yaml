run_group: typescript_github_5090_tinycore
seed: 1337
device: cuda
dataset:
  name: typescript_github_top100_v0
  train_fraction: 0.98
  repeat: 1
model:
  model_type: tinycore_recurrent_v0
  vocab_size: 128
  d_model: 384
  n_heads: 8
  n_layers: 8
  n_virtual_layers: 12
  n_families: 1
  basis_rank: 8
  low_rank: 0
  recurrent_state_dim: 64
  mlp_ratio: 4
  max_seq_len: 512
  dropout: 0.0
  rope: false
  tie_embeddings: true
  precision_target: bf16
variants:
  - name: baseline_transformer_ts_github_v0
    model_type: baseline_transformer_v0
  - name: tinycore_recurrent_ts_github_v0
    model_type: tinycore_recurrent_v0
    overrides:
      low_rank: 16
      recurrent_state_dim: 64
training:
  batch_size: 32
  seq_len: 512
  max_steps: 30000
  eval_interval: 1500
  lr: 0.0006
  weight_decay: 0.01
  grad_clip: 1.0
  select_best_eval_checkpoint: true
generation:
  prompt: "Q:repo summary|A:"
  max_new_tokens: 128
  temperature: 0.0
eval:
  enabled: true
  suite_name: typescript_github_holdout_v0
  max_new_tokens: 128
  temperature: 0.0
