run_group: instruction_code_5090_tinycore
seed: 1337
device: cuda
dataset:
  name: tinycore_instruction_code_5090_v0
  train_fraction: 0.9
  repeat: 1
model:
  model_type: tinycore_recurrent_v0
  vocab_size: 128
  d_model: 384
  n_heads: 8
  n_layers: 8
  n_virtual_layers: 12
  n_families: 1
  basis_rank: 8
  low_rank: 0
  recurrent_state_dim: 64
  mlp_ratio: 4
  max_seq_len: 256
  dropout: 0.0
  rope: false
  tie_embeddings: true
  precision_target: bf16
variants:
  - name: baseline_transformer_5090_v0
    model_type: baseline_transformer_v0
  - name: tinycore_recurrent_5090_v0
    model_type: tinycore_recurrent_v0
    overrides:
      low_rank: 16
      recurrent_state_dim: 64
training:
  batch_size: 64
  seq_len: 256
  max_steps: 20000
  eval_interval: 1000
  lr: 0.0008
  weight_decay: 0.01
  grad_clip: 1.0
  select_best_eval_checkpoint: true
generation:
  prompt: "Q:py clamp|A:"
  max_new_tokens: 96
  temperature: 0.0
eval:
  enabled: true
  suite_name: instruction_code_5090_holdout_v0
  max_new_tokens: 96
  temperature: 0.0
